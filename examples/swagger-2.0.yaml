swagger: "2.0"
# The Swagger 2.0 twin of examples/openapi.yaml — a small, well-governed spec in
# the OLDER format, to prove the ruleset governs 2.0 with parity. It PASSES all
# blocking (error) rules and most of the warn rules. Note where 2.0 differs from
# 3.x: securitySchemes -> securityDefinitions, servers[].url -> host/basePath/
# schemes, components.schemas -> definitions, and a response's body is a single
# `schema` (no per-media-type `content` map — media types live in `produces`).
info:
  title: Widgets API
  version: 1.0.0
  description: >-
    The Widgets API lets partners create, read, and retire widgets in the ACME
    catalog. It is the Swagger 2.0 reference example for the governance-pipeline
    blueprint: every operation is named and described, errors share one shape,
    and the API declares how it is secured.
  contact:
    name: Widgets Platform Team
    email: widgets@acme.example
    url: https://handbook.acme.example/api/widgets
host: api.acme.example
basePath: /v1
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json
securityDefinitions:
  apiKey:
    type: apiKey
    in: header
    name: X-API-Key
paths:
  /widgets:
    get:
      operationId: listWidgets
      summary: List widgets
      description: >-
        Return a paginated list of widgets visible to the caller. Use the
        `cursor` query parameter to page through results.
      tags: [Widgets]
      security:
        - apiKey: []
      responses:
        "200":
          description: A page of widgets.
          schema:
            $ref: "#/definitions/WidgetList"
        "429":
          description: Too many requests.
          schema:
            $ref: "#/definitions/Problem"
    post:
      operationId: createWidget
      summary: Create a widget
      description: >-
        Create a new widget in the catalog. Returns the created widget with its
        server-assigned identifier.
      tags: [Widgets]
      security:
        - apiKey: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/Widget"
      responses:
        "201":
          description: The created widget.
          schema:
            $ref: "#/definitions/Widget"
        "400":
          description: The request was invalid.
          schema:
            $ref: "#/definitions/Problem"
definitions:
  Widget:
    type: object
    properties:
      id:
        type: string
        description: Server-assigned unique identifier for the widget.
      name:
        type: string
        description: Human-readable widget name shown in the catalog.
  WidgetList:
    type: object
    properties:
      items:
        type: array
        description: The widgets on this page.
        items:
          $ref: "#/definitions/Widget"
      cursor:
        type: string
        description: Opaque cursor for fetching the next page, if any.
  Problem:
    type: object
    description: RFC 9457 Problem Details error shape shared by all operations.
    properties:
      type:
        type: string
        description: A URI identifying the problem type.
      title:
        type: string
        description: A short, human-readable summary of the problem.
      status:
        type: integer
        description: The HTTP status code for this occurrence of the problem.
